<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мечта Бьюти - Колесо Фортуны</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a67c6d;
            --primary-dark: #8e5e4e;
            --accent: #d4af37;
            --bg: #fffdfa;
            --text: #2c2c2c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            /* ФОНОВЫЕ ИЗОБРАЖЕНИЯ (Листики и блестки) */
            background-image: 
                url('https://www.transparentpng.com/download/leaves/green-leaves-transparent-background-3.png'), /* Левый нижний угол */
                url('https://www.transparentpng.com/download/glitter/gold-glitter-dust-transparent-background-15.png'); /* Правый верхний угол */
            background-position: left bottom, right top;
            background-repeat: no-repeat, no-repeat;
            background-size: 150px auto, 200px auto;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        .loader-logo {
            width: 180px;
            height: auto;
            max-height: 180px;
            object-fit: contain;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-top: 15px;
            padding: 0 20px;
            z-index: 1;
        }

        /* ОБНОВЛЕННЫЙ ДЕКОР ИЗ PNG ФАЙЛОВ */
        .decor { 
            position: fixed; 
            pointer-events: none; 
            z-index: 0; 
        }
        .decor-brunch { 
            bottom: -20px; 
            left: -30px; 
            width: 200px; 
            transform: rotate(-10deg); 
            opacity: 0.9; 
        }
        .decor-dust { 
            top: 50%; 
            left: 50%; 
            /* Центрируем идеально по середине */
            transform: translate(-50%, -50%); 
            /* Ширину делаем больше колеса (310px), чтобы пыльца «выглядывала» по бокам */
            width: 550px; 
            opacity: 0.6; 
            /* Можно добавить легкое размытие для мягкости как в макете */
            filter: blur(2px); 
        }

        
        .logo { 
            width: 80px; 
            height: auto; 
            max-height: 80px; 
            object-fit: contain; 
            margin-bottom: 5px; 
        }
        
        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 26px; 
            margin: 0; 
            color: var(--primary-dark);
        }

        .occasion {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: var(--accent);
            margin: 2px 0 15px 0;
        }

        /* Колесо */
        .wheel-container {
            position: relative;
            width: 310px;
            height: 310px;
            margin-bottom: 25px;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #fff;
            box-shadow: 0 10px 25px rgba(166, 124, 109, 0.25);
            transition: transform 0s;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 45px;
            /* Золотой цвет для максимального контраста */
            background: #d4af37; 
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            /* Добавляем тень, чтобы стрелка "приподнялась" над колесом */
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            /* Тонкая белая линия сверху, чтобы отделить от фона */
            border-top: 1px solid rgba(255,255,255,0.5);
        }

        /* Форма */
        .ui { width: 85%; max-width: 310px; display: flex; flex-direction: column; gap: 12px; z-index: 1; }
        
        input {
            padding: 15px;
            border-radius: 25px;
            border: 1px solid #e0d7d3;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            text-align: center;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        button {
            padding: 15px;
            border-radius: 25px;
            border: none;
            background: var(--primary-dark);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 94, 78, 0.3);
            transition: all 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #result {
            margin-top: 15px;
            text-align: center;
            font-size: 19px;
            font-weight: 600;
            color: var(--primary-dark);
            padding: 0 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Эффект конфетти */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            opacity: 0.8;
            border-radius: 50%;
            animation: confetti-fall 4s ease-out infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<img src="brunch.png" class="decor decor-brunch">
<img src="dust.png" class="decor decor-dust">
    
<div id="loading-screen">
    <img src="logo_b.png" class="loader-logo" alt="Загрузка...">
    <p style="font-family: 'Cormorant Garamond'; color: var(--primary-dark); margin-top: 20px; font-size: 18px;">Загружаем весеннее настроение...</p>
</div>

<div class="header">
    <img src="logo_b.png" class="logo" alt="Мечта Бьюти">
    <h1>Мастерская тела Мечта бьюти</h1>
    <div class="occasion">Твой весенний подарок!🌹</div>
</div>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="600" height="600"></canvas>
</div>

<div class="ui" id="ui-block">
    <input type="tel" id="phone" placeholder="+7 (999) 000-00-00">
    <button id="spin-btn" disabled>ПОДОЖДИТЕ...</button>
</div>
<div id="result"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzKjD3EU8ry3xDkiIdHJ2V0rvmnQ6jvG32Tjk100DGgv8vqn2dBvAVaIWvEcY7AuRo/exec";
    const tg = window.Telegram.WebApp;
    
    // Заглушки, чтобы колесо нарисовалось мгновенно
    let prizes = [
        {label: "Подарок", color: "#a67c6d"}, {label: "Бонус", color: "#d4af37"},
        {label: "Сюрприз", color: "#8e5e4e"}, {label: "Скидка", color: "#a67c6d"}
    ];
    
    let currentRotation = 0;
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-btn');

    tg.ready();
    tg.expand();

    function getContrastColor(hexcolor) {
        if (!hexcolor) return '#ffffff';
        const r = parseInt(hexcolor.substr(1,2), 16);
        const g = parseInt(hexcolor.substr(3,2), 16);
        const b = parseInt(hexcolor.substr(5,2), 16);
        const yiq = ((r*299) + (g*587) + (b*114)) / 1000;
        return (yiq >= 145) ? '#2c2c2c' : '#ffffff';
    }

    async function loadData() {
        // Отрисовываем заглушки сразу
        draw();
        try {
            const r = await fetch(GAS_URL);
            const data = await r.json();
            if (data.length > 0) {
                prizes = data;
                draw(); // Перерисовываем с реальными данными
            }
            
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').remove(), 600);
            }, 800);
            
            spinBtn.disabled = false;
            spinBtn.innerText = "ИСПЫТАТЬ УДАЧУ";
        } catch(e) { 
            console.error("Ошибка загрузки:", e);
            document.getElementById('loading-screen').remove();
            spinBtn.disabled = false;
            spinBtn.innerText = "ИСПЫТАТЬ УДАЧУ";
        }
    }

    function draw() {
        const slice = 360 / prizes.length;
        ctx.clearRect(0,0,600,600);
        prizes.forEach((p, i) => {
            const startAngle = (i * slice) * Math.PI/180;
            const endAngle = ((i + 1) * slice) * Math.PI/180;
            
            ctx.beginPath();
            ctx.fillStyle = p.color || "#a67c6d";
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, startAngle, endAngle);
            ctx.fill();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(startAngle + (endAngle - startAngle)/2);
            ctx.fillStyle = getContrastColor(p.color);
            ctx.font = "bold 22px Montserrat";
            ctx.textAlign = "right";
            ctx.fillText(p.label, 275, 10);
            ctx.restore();
        });
    }

    // Функция для создания эффекта конфетти
    function startConfetti() {
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.backgroundColor = i % 2 === 0 ? 'var(--accent)' : 'var(--primary)';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000); // Удаляем через 4 секунды
        }
    }

    spinBtn.onclick = async () => {
    let phoneInput = document.getElementById('phone').value.replace(/\D/g, '');
    if (phoneInput.length < 10) return alert("Введите корректный номер телефона.");

    spinBtn.disabled = true;

    // Получаем имя пользователя из Telegram
    const user = tg.initDataUnsafe?.user;
    const firstName = user?.first_name || "Гость";
    const username = user?.username || ""; // Получаем никнейм без @
            
    // Анимация ожидания (оставляем вашу логику)
    let preRollSpeed = 2;
    const interval = setInterval(() => {
        currentRotation += preRollSpeed;
        if (preRollSpeed < 12) preRollSpeed += 0.2; 
        canvas.style.transform = `rotate(${currentRotation}deg)`;
    }, 16);

    try {
        const resp = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ 
                phone: phoneInput, 
                chat_id: user?.id || null,
                user_name: firstName, // Передаем имя на сервер
                user_handle: username // ПЕРЕДАЕМ НИКНЕЙМ
            })
        });
        const data = await resp.json();
        clearInterval(interval);

        if (data.error) {
            alert(data.error === "already_played" ? "Вы уже участвовали в акции!" : "Ошибка сервера");
            spinBtn.disabled = false;
            return;
        }

        // Логика финального вращения (оставляем вашу)
        const slice = 360 / prizes.length;
        const extra = 360 * 5;
        const stopAt = (360 - (data.index * slice)) - (slice / 2) + 270;
        const final = currentRotation + extra + (stopAt - (currentRotation % 360));

        canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
        canvas.style.transform = `rotate(${final}deg)`;
        currentRotation = final;

        setTimeout(() => {
            // ОБНОВЛЕННЫЙ ТЕКСТ ПОСЛЕ ВЫИГРЫША
            document.getElementById('result').innerHTML = `
                🎊 Поздравляем, ${firstName}! 🎊<br>
                Твой приз: <b>${data.label}</b><br>
                <span style="font-size: 14px; color: var(--accent); display: block; margin-top: 10px;">
                    Инструкции, как забрать приз, уже отправлены ботом @MechtaBeautyMsk_bot
                </span>
            `;
            document.getElementById('ui-block').style.display = 'none';
            
            if (typeof startConfetti === 'function') startConfetti();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }, 4200);

    } catch (e) {
        clearInterval(interval);
        alert("Сбой связи.");
        spinBtn.disabled = false;
    }
};

    loadData();
</script>
</body>
</html>
